# ── Dataset configuration ──
data:
  name: default
  file: transformed_dataset.csv
  source: transformed       # transformed | external | processed
  target_column: target
  features: null            # null = use all columns except target
  split_strategy: random    # random | stratified | temporal
  val_size: 0.1
  test_size: 0.2
  preprocessing:
    handle_missing: mean    # drop | mean | median | zero
    scale: standard         # standard | minmax | robust | null
    drop_duplicates: true
  transform:
    inputs: []                          # [{path: "my.csv", source: external, adapter: csv}, {path: "assets", source: external, adapter: copy_dir}]
    output_file: transformed_dataset.csv
    include_source_column: true
